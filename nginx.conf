## nginx.conf — пример конфигурации для Telegram Webhook
## Разместите на сервере: /etc/nginx/sites-available/shopbot
## Затем: ln -s /etc/nginx/sites-available/shopbot /etc/nginx/sites-enabled/
## nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com;

    # Перенаправляем HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL (certbot: sudo certbot --nginx -d your-domain.com)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Telegram Bot Webhook
    location /bot/webhook {
        proxy_pass         http://127.0.0.1:8443;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # FreeKassa Webhook
    location /fk/webhook {
        proxy_pass         http://127.0.0.1:8443/fk/webhook;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
}
